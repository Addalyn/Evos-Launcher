<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evos Chat WebSocket Tester</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f0f1a;
            color: #eee;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .controls {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            align-items: center;
        }
        input, button {
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #333;
            background: #2a2a40;
            color: white;
        }
        button {
            background: #3a5aff;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }
        button:hover {
            background: #5a7aff;
        }
        button.disconnect {
            background: #ff4a4a;
        }
        #status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .status-disconnected { background: #442222; color: #ff8888; }
        .status-connected { background: #224422; color: #88ff88; }
        .status-connecting { background: #444422; color: #ffff88; }

        #log {
            flex: 1;
            background: #05050a;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-family: "Cascadia Code", "Courier New", monospace;
            font-size: 0.9em;
        }
        .msg { margin-bottom: 8px; border-bottom: 1px solid #111; padding-bottom: 4px; }
        .msg.chat { color: #88ccff; }
        .msg.system { color: #aaaaaa; font-style: italic; }
        .msg.info { color: #88ff88; }
        .msg.error { color: #ff8888; }
        .msg.raw { color: #666; font-size: 0.8em; }

        .input-area {
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Evos Chat Tester</h2>
        
        <div class="controls">
            <input type="text" id="url" value="wss://launcher.evos.live/chat" placeholder="WS URL (e.g. wss://chat.evos.live/chat)">
            <input type="text" id="username" value="TestUser" placeholder="Username">
            <button id="connectBtn" onclick="toggleConnect()">Connect</button>
            <div id="status" class="status-disconnected">DISCONNECTED</div>
            <div id="onlineCount">Online: 0</div>
        </div>

        <div id="log"></div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') send()">
            <button onclick="send()">Send</button>
        </div>
    </div>

    <script>
        let ws = null;
        const log = document.getElementById('log');
        const status = document.getElementById('status');
        const urlInput = document.getElementById('url');
        const usernameInput = document.getElementById('username');
        const connectBtn = document.getElementById('connectBtn');
        const onlineCount = document.getElementById('onlineCount');

        function appendLog(type, content) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            const time = new Date().toLocaleTimeString();
            
            if (typeof content === 'object') {
                content = JSON.stringify(content);
            }
            
            div.innerHTML = `<span style="color:#555">[${time}]</span> ${content}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function setStatus(s) {
            status.textContent = s.toUpperCase();
            status.className = `status-${s.toLowerCase()}`;
            if (s === 'connected') {
                connectBtn.textContent = 'Disconnect';
                connectBtn.className = 'disconnect';
            } else {
                connectBtn.textContent = 'Connect';
                connectBtn.className = '';
            }
        }

        function toggleConnect() {
            if (ws) {
                ws.close();
                return;
            }

            const rawUrl = urlInput.value || 'wss://chat.evos.live/chat';
            const user = usernameInput.value;
            const fullUrl = `${rawUrl}${rawUrl.includes('?') ? '&' : '?'}username=${encodeURIComponent(user)}`;

            appendLog('info', `Connecting to ${fullUrl}...`);
            setStatus('connecting');

            try {
                ws = new WebSocket(fullUrl);

                ws.onopen = () => {
                    setStatus('connected');
                    appendLog('info', 'WebSocket Connected');
                    ws.send(JSON.stringify({ type: 'INIT', handle: user }));
                };

                ws.onmessage = (event) => {
                    appendLog('raw', `RECV: ${event.data}`);
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'CHAT') {
                            appendLog('chat', `<b>${data.handle}:</b> ${data.text}`);
                        } else if (data.type === 'ONLINE_COUNT') {
                            onlineCount.textContent = `Online: ${data.count}`;
                        } else if (data.type === 'HISTORY') {
                            appendLog('system', `--- Received ${data.messages.length} history messages ---`);
                            data.messages.forEach(m => {
                                appendLog('chat', `(History) <b>${m.handle}:</b> ${m.text}`);
                            });
                        } else if (data.players) {
                            appendLog('info', `Lobby Status Update: ${data.players.length} players online`);
                        }
                    } catch (e) {
                        appendLog('error', 'Failed to parse JSON');
                    }
                };

                ws.onclose = (event) => {
                    setStatus('disconnected');
                    appendLog('error', `WebSocket Closed (code: ${event.code}, reason: ${event.reason || 'none'})`);
                    ws = null;
                };

                ws.onerror = (error) => {
                    appendLog('error', 'WebSocket Error occurred');
                    console.error(error);
                };
            } catch (e) {
                appendLog('error', `Exception: ${e.message}`);
                setStatus('disconnected');
                ws = null;
            }
        }

        function send() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                appendLog('error', 'Not connected');
                return;
            }
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            const msg = {
                type: 'CHAT',
                handle: usernameInput.value,
                text: text
            };
            ws.send(JSON.stringify(msg));
            input.value = '';
        }
    </script>
</body>
</html>
